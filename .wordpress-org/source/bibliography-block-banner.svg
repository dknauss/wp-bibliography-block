<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 560" width="1920" height="560">

  <!-- Background -->
  <rect width="1920" height="560" fill="#F5F3EF"/>

  <!-- Books (icon scaled 420/256 = 1.640625, placed at 80,58, shelf omitted) -->
  <g transform="translate(80, 58) scale(1.640625)">

    <!-- Book 1 (left) — leaning inward -->
    <g transform="translate(56, 52) rotate(4, 42, 148)">
      <rect x="0" y="0" width="42" height="148" rx="2" fill="#2D3136"/>
      <rect x="0" y="0" width="5"  height="148" rx="1" fill="#23272B"/>
      <rect x="12" y="68" width="20" height="8" rx="1.5" fill="white" opacity="0.85"/>
    </g>

    <!-- Book 2 (center) — blue face visible -->
    <g transform="translate(102, 44)">
      <rect x="0"  y="0" width="14" height="156" rx="1" fill="#7B8FA1"/>
      <rect x="10" y="0" width="40" height="156" rx="2" fill="#2D3136"/>
      <rect x="10" y="0" width="5"  height="156" rx="1" fill="#23272B"/>
      <rect x="22" y="72" width="20" height="8" rx="1.5" fill="white" opacity="0.85"/>
    </g>

    <!-- Book 3 (right) -->
    <g transform="translate(156, 56)">
      <rect x="0" y="0" width="42" height="144" rx="2" fill="#2D3136"/>
      <rect x="0" y="0" width="5"  height="144" rx="1" fill="#23272B"/>
      <rect x="12" y="66" width="20" height="8" rx="1.5" fill="white" opacity="0.85"/>
    </g>

  </g>

  <!-- Unified gold baseline — books and wordmark share one rule -->
  <rect x="152" y="386" width="579" height="7" fill="#C4973E"/>

  <!-- Wordmark — y is the alphabetic baseline, computed from Liberation Serif metrics -->
  <text
    x="449" y="282"
    font-family="'Libre Baskerville', Baskerville, 'Liberation Serif', 'Times New Roman', serif"
    font-size="148"
    font-weight="400"
    fill="#2D3136"
    text-anchor="start">Bibliography Block</text>

  <!-- Subtitle -->
  <text
    x="449" y="359"
    font-family="'Libre Baskerville', Baskerville, 'Liberation Serif', 'Times New Roman', serif"
    font-size="50"
    font-weight="400"
    fill="#7B8FA1"
    text-anchor="start">Scholarly references for WordPress</text>

</svg>
